---
- name: Configure linux development environment
  hosts: localhost
  connection: local
  become: yes

  tasks:
      - name: Perform System Update
        pacman:
          update_cache: yes
          upgrade: yes

      - name: Install Required Packages
        pacman:
          name: "{{ item }}"
          state: present
        loop:
          - htop
          - nvtop
          - fzf
          - ripgrep
          - fd
          - tmux
          - openssh
          - firefox
          - cmake
          - npm
          - unzip
          - glow
          - zip
          - lsof
          - netcat
          - tcpdump
          - iperf3
          - tree
          - curl
          - less
          - vim
          - nvim
          - mpv
          - gammastep
          - graphviz
          - wayland
          - wayland-protocols
          - wlroots0.19
          - wl-clipboard
          - wlr-randr
          - wf-recorder
          - foot
          - kmscon
          - base-devel
          - grim
          - slurp
          - swaybg
          - swayimg
          - tllist
          - fcft
          - pixman
          - ttf-jetbrains-mono-nerd
          - noto-fonts
          - noto-fonts-cjk
          - noto-fonts-emoji
          - noto-fonts-extra
          - pipewire
          - pipewire-pulse
          - pipewire-alsa
          - wireplumber
        tags:
          - install_packages

      - name: Miscellaneous Environment Setup
        shell: |
            git config --global core.editor "nvim"
            usermod -aG wireshark $USER
            chown -R $USER:$USER /home/{{ ansible_env.SUDO_USER }}/repo/dotfiles
        tags:
          - misc_env_setup
        register: system_run_misc_commands
      - debug:
          msg: "{{ system_run_misc_commands }}"

      - name: Create Config Directory
        ansible.builtin.file:
          path: /home/{{ ansible_env.SUDO_USER }}/.config
          state: directory
          owner: "{{ ansible_env.SUDO_USER }}"
          group: "{{ ansible_env.SUDO_USER }}"
          mode: "0755"

      - name: Copy Dotfiles to Directories
        copy: 
          src: "{{ item.src }}"
          dest: "{{ item.dest }}"
          owner: "{{ ansible_env.SUDO_USER }}"
          group: "{{ ansible_env.SUDO_USER }}"
          mode: "{{ item.mode | default('0755') }}"
        with_items:
            - { src: "{{ playbook_dir }}/foot/", dest: "/home/{{ ansible_env.SUDO_USER }}/.config/foot/" }
            - { src: "{{ playbook_dir }}/nvim/", dest: "/home/{{ ansible_env.SUDO_USER }}/.config/nvim/" }
            - { src: "{{ playbook_dir }}/nvim/.vimrc", dest: "/home/{{ ansible_env.SUDO_USER }}/.vimrc" }
            - { src: "{{ playbook_dir }}/bash/.bashrc", dest: "/home/{{ ansible_env.SUDO_USER }}/.bashrc" }
            - { src: "{{ playbook_dir }}/tmux/.tmux.conf", dest: "/home/{{ ansible_env.SUDO_USER }}/.tmux.conf" }
        tags:
          - update_dotfiles

      - name: Create /etc/kmscon Directory
        ansible.builtin.file:
          path: /etc/kmscon
          state: directory
          owner: root
          group: root
          mode: "0755"
        tags:
          - kmscon_setup

      - name: Copy kmscon Config
        ansible.builtin.copy:
          src: "{{ playbook_dir }}/kmscon/kmscon.conf"
          dest: /etc/kmscon/kmscon.conf
          owner: root
          group: root
          mode: "0644"
        tags:
          - kmscon_setup

      - name: Enable kmscon On tty2
        ansible.builtin.systemd:
          name: kmsconvt@tty2.service
          enabled: yes
        tags:
          - kmscon_setup

      - name: Install tree-sitter-cli (nvim)
        ansible.builtin.command:
          cmd: npm install -g --allow-scripts=tree-sitter-cli tree-sitter-cli
        become: true
        changed_when: true
        tags:
          - install_tree_sitter_cli

      - name: Git Clone dwl
        git:
          repo: https://github.com/tkyc/dwl.git
          dest: /home/{{ ansible_env.SUDO_USER }}/repo/dwl
          version: main
          clone: yes
          update: yes
        become_user: "{{ ansible_env.SUDO_USER }}"

      - name: Build dwl
        shell: |
            cd /home/{{ ansible_env.SUDO_USER }}/repo/dwl
            make clean install
        register: system_build_dwl
      - debug:
          msg: "{{ system_build_dwl }}"

      # TODO: Enable Audio

